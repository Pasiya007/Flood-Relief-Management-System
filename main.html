<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Flood Relief Management System</title>
  <link rel="stylesheet" href="style_main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="page-wrapper">

    <div class="left-panel">
      <div class="brand">
        <h1 class="brand-title">Flood Relief<br/>Management<br/>System</h1>
        <p class="brand-sub">Sri Lanka Disaster Response Portal</p>
      </div>
      <div class="wave-bg"></div>
      <ul class="feature-list">
        <li><span class="dot"></span>Submit flood relief requests</li>
        <li><span class="dot"></span>Track your relief status</li>
        <li><span class="dot"></span>Admin monitoring &amp; reports</li>
      </ul>
    </div>

    <div class="right-panel">
      <div class="form-card">
        <h2 class="form-title">Welcome Back</h2>
        <p class="form-subtitle">Sign in to your account to continue</p>

        <form id="loginForm">

          <div class="input-group">
            <label for="nic">NIC Number</label>
            <div class="input-wrap">
              <input type="text" id="nic" placeholder="Enter your NIC" required>
            </div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input type="password" id="password" placeholder="Enter your password" required>
            </div>
          </div>
          <button type="submit" class="btn-login">Sign In</button>

          <p class="signup-prompt">
            Don't have an account? <a href="signup.html">Create one here</a>
          </p>

          <div style="margin-top: 25px; text-align: center;">
            <a href="#" onclick="openAdminModal()" style="color: var(--gray-500); font-size: 0.85rem; text-decoration: none; font-weight: 600;">🔒 Admin Access</a>
          </div>

        </form>
      </div>
    </div>
  </div>

  <div id="adminModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 47, 94, 0.6); align-items: center; justify-content: center; z-index: 1000;">
    <div class="form-card" style="width: 320px; padding: 25px; margin: 0;">
        <h3 style="margin-bottom: 15px; color: var(--blue-dark); text-align: center;">Admin Verification</h3>
        <input type="password" id="adminPasswordInput" placeholder="Enter Admin Password" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid var(--gray-300); border-radius: 8px; box-sizing: border-box;">
        <div style="display: flex; justify-content: space-between; gap: 10px;">
            <button type="button" onclick="closeAdminModal()" style="flex: 1; padding: 10px; border: none; background: var(--gray-300); color: var(--gray-700); border-radius: 8px; cursor: pointer; font-weight: 600;">Cancel</button>
            <button type="button" onclick="verifyAdmin()" style="flex: 1; padding: 10px; border: none; background: var(--danger); color: white; border-radius: 8px; cursor: pointer; font-weight: 600;">Enter Panel</button>
        </div>
    </div>
  </div>

  <script src="script.js?v=8"></script>
</body>
</html>
