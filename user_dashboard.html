<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Flood Relief Management</title>
    <link rel="stylesheet" href="style_user_admin.css" />
</head>
<body class="page-wrapper">
<nav class="navbar">
    <a href="user_dashboard.html" class="navbar-brand">
        
        <span class="brand-text">
            Flood Relief
        <span class="brand-sub">Management System</span>
        </span>
    </a>
    <div class="navbar-nav">
        <a href="#" class="nav-link active">My Requests </a>
    </div>
    <div class="nav-user">
        <div class="avatar" id="nav-avatar">U</div>
        <span id="displayName" style="font-size:0.8rem;opacity:0.85">Loading...</span>
        
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<main class="main-content">
    <div class="page-header">
        <div>
            <div class="page-title">My Relief Requests</div>
            <div class="page-subtitle">Submit and manage your flood relief application</div>
        </div>
        <button class="btn btn-accent" onclick="openNewRequest()">
            +New Request
        </button>
    </div>

<div id="requests-list" class="request-list">
    <p style="color:var(--text-muted);font-size:0.875rem">Loading your requests...</p>
</div>
</main>

<div class="modal-overlay" id="request-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">New Relief Request </span>
            <button class="modal-close" onclick="closeModal('request-modal')">&times;</button>
        </div>
        <div class="modal-body">
            <form id="request-form">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="relief_type">Type of Relief <span style="color:var(--danger)">*</span></label>
                        <select id="relief_type" class="form-control" required>
                            <option value="">Select type...</option>
                            <option value="Food"> Food </option>
                            <option value="Water">Water</option>
                            <option value="Medicine">Medicine</option>
                            <option value="Shelter">Shelter</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="severity">Flood Severity<span style="color:var(--danger)">*</span></label>
                        <select id="severity" class="form-control" required>
                            <option value="">Select level...</option>
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="district">District<span style="color:var(--danger)">*</span></label>
                        <select id="district" class="form-control" required>
                            <option value="">Select district..</option>
                            <option>Ampara</option><option>Anuradhapura</option><option>Badulla</option>
                            <option>Colombo</option><option>Gampaha</option><option>Kalutara</option>
                            </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="divisional_secretariat">Divisional Secretariat<span style="color:var(--danger)">*</span></label>
                        <input type="text" id="divisional_secretariat" class="form-control" placeholder="Eg:- Colombo" required />
                    </div>
                </div>
                        
                <div class="form-group">        
                    <label class="form-label" for="gn_division">GN Division <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="gn_division" class="form-control" placeholder="Grama Niladhari Division" required />
                </div>

                <div class="section-divider"></div>
                <p style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:0.8rem">Household Details</p>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="contact_name">Contact Person Name<span style="color:var(--danger)">*</span></label>
                        <input type="text" id="contact_name" class="form-control" placeholder="Full name" required />
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="contact_number">Contact Number<span style="color:var(--danger)">*</span></label>
                        <input type="tel" id="contact_number" class="form-control" placeholder="07X XXXXXXX" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="address">Address<span style="color:var(--danger)">*</span></label>
                        <input type="text" id="address" class="form-control" placeholder="House no, street, city" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="family_members">Number of Family Members <span style="color:var(--danger)">*</span></label>
                        <input type="number" id="family_members" class="form-control" placeholder="Eg:= 4" min="1" max="99" required/>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="description">Description /Special Requirements </label>
                    <textarea id="description" class="form-control" placeholder="Any additional or special requirements..."></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('request-modal')">Cancel</button>
            <button type="submit" class="btn btn-primary" onclick="document.getElementById('request-form').dispatchEvent(new Event('submit'))">
            Submit Request
            </button>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="script.js"></script>

</body>
</html>
