<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard- Flood Relief Management</title>
     <link rel="stylesheet" href="style.css" />
</head>
<body class="page-wrapper">
<!--Navbar-->
<nav class="navbar">
    <a href="user-dashboard.html" class="navbar-brand">
        <span class="brand-icon">🌊</span>
        <span class="brand-text">
            Flood Relief
        <span class="brand-sub">Management System</span>
        </span>
    </a>
    <div class="navbar-nav">
        <a href="user-dashboard.html" class="nav-link active">My Requests </a>
    </div>
    <div class="nav-user">
        <div class="avatar" id="nav-avatar">U</div>
        <span id="nav-nic" style="font-size:0.8rem;opacity:0.85"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<!--Main-->
<main class="main-content">
    <div class="page-header">
        <div>
            <div class="page-title">My Relief Requests</div>
            <div class="page-subtitle">Submit and manage your flood relief application</div>
        </div>
        <button class="btn btn-accent" onclick="openNewRequest()">
            +New Request
        </button>
    </div>

<!--Requests-->
<div id="requests-list" class="request-list">
    <p style="color:var(--text-muted);font-size:0.875rem">Loading your request</p>
</div>
</main>

<!--New/Edit Request-->
<div class="modal-overlay" id="request-modal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="modal-title">New Relief Request </span>
            <button class="modal-close" onclick="closeModal('request-modal')">&times;</button>
    </div>
    <div class="modal-body">
        <form id="request-form">
        <!--Type-->
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="relief_type">Type of Relief <span style="color:var(--danger)">*</span></label>
                <select id="relief_type" class="form-control" required>
                    <option value="">Select type...</option>
                    <option value="Food"> Food </option>
                    <option value="Water">Water</option>
                    <option value="Medicine">Medicine</option>
                    <option value="Shelter">Shelter</option>
                </select>
                <div class="form-error"></div>
            </div>
            <div class="form-group">
                <label class="form-label" for="severity">Flood Severity<span style="color:var(--danger)">*</span></label>
                <select id="severity" class="form-control" required>
                    <option value="">Select level...</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
                <div class="form-error"></div>
            </div>
        </div>

<!--Location-->
<div class="form-row">
    <div class="form-group">
        <label class="form-label" for="district">District<span style="color:var(--danger)">*</span></label>
        <select id="district" class="form-control" required>
            <option value="">Select district..</option>
              <option>Ampara</option><option>Anuradhapura</option><option>Badulla</option>
              <option>Batticaloa</option><option>Colombo</option><option>Galle</option>
              <option>Gampaha</option><option>Hambantota</option><option>Jaffna</option>
              <option>Kalutara</option><option>Kandy</option><option>Kegalle</option>
              <option>Kilinochchi</option><option>Kurunegala</option><option>Mannar</option>
              <option>Matale</option><option>Matara</option><option>Monaragala</option>
              <option>Mullaitivu</option><option>Nuwara Eliya</option><option>Polonnaruwa</option>
              <option>Puttalam</option><option>Ratnapura</option><option>Trincomalee</option>
              <option>Vavuniya</option>
        </select>
        <div class="form-error"></div>
        </div>
        <div class="form-group">
            <label class="form-label" for="divisional_secretariat">Divisional Secretariat<span style="color:var(--danger)">*</span></label>
            <input type="text" id="divisional_secretariat" class="form-control" placeholder="Eg:- Colombo" required />
        <div class="form-error"></div>
    </div>
    </div>
            
    <div class="form-group">        
            <label class="form-label" for="gn_division">GN Division <span style="color:var(--danger)">*</span></label>
            <input type="text" id="gn_division" class="form-control" placeholder="Grama Niladhari Division" required />
        <div class="form-error"></div>
    </div>

    <!--Household-->
    <div class="section-divider"></div>
    <p style="font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:0.8rem">Household Details</p>
    <div class="form-row">
        <div class="form-group">
            <label class="form-label" for="contact_name">Contact Person Name<span style="color:var(--danger)">*</span></label>
    <input type="text" id="contact_name" class="form-control" placeholder="Full name" required />
    <div class="form-error"></div>
    </div>
    
    <div class="form-group">
        <label class="form-label" for="contact_name">Contact Number
        <span style="color:var(--danger)">*</span></label>
        <input type="tel" id="contact_number" class="form-control" placeholder="07X XXXXXXX" required />
        <div class="form-error"></div>
    </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label class="form-label" for="address">Address<span style="color:var(--danger)">*</span></label>
            <input type="text" id="address" class="form-control" placeholder="House no, street, city" required />
            <div class="form-error"></div>
        </div>
        <div class="form-group">
            <label class="form-label" for="family_members">Number of Family Members <span style="color:var(--danger)">*</span></label>
            <input type="number" id="family_members" class="form-control" placeholder="Eg:= 4" min="1" max="99" required/>
            <div class="form-error"></div>
        </div>
    </div>

    <div class="form-group">
        <label class="form-label" for="description">Description /Special Requirements </label>
        <textarea id="description" class="form-control" placeholder="Any additional or special requirements..."></textarea>
    </div>
    </form>
    </div>
    <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('request-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" onclick="document.getElementById('request-form').dispatchEvent(new Event('submit'))">
        Submit Request
        </button>
    </div>
    </div>
</div>

<!--Toast-->
<div id="toast-container" class="toast-container"></div>

<script src="js/main.js"></script>
<script>
//Load NIC from session via a quick call
(async () => {
    const res = await fetch('php/api.php?action=get_my_requests', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
    const data = await res.json();
    if (!data.success && data.message === 'Unauthorized. Please login.') {
      window.location.href = 'index.html';
    }
  })();

  //Set avatar from a stored NIC
const storedNic = sessionStorage.getItem('nic') || '';
if (storedNic) {
    document.getElementById('nav-nic').textContent = storedNic;
    document.getElementById('nav-avatar').textContent = storedNic.charAt(0).toUpperCase();
  }

function openNewRequest() {
    document.getElementById('modal-title').textContent = 'New Relief Request';
    document.getElementById('request-form').reset();
    delete document.getElementById('request-form').dataset.editId;
    document.getElementById('request-form').querySelector
      && (document.querySelector('#request-form + .modal-footer .btn-primary').textContent = 'Submit Request');
    openModal('request-modal');
  }
</script>
</body>
</html>
