<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style_signup.css">
</head>
<body>
    <div class="container">
        <h2>Sign Up</h2>
        <form id="SignUpForm">

            <label>User Name</label>
            <input type="text" id="userName" placeholder="Enter User Name">
            <div class="error" id="nameError">Enter a User Name</div>

            <label>NIC Number</label>
            <input type="text" id="nic" placeholder="Enter NIC Number">
            <div class="error" id="nicError">Enter a Valid NIC Number</div>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter Password">

            <label>Confirm Password</label>
            <input type="password" id="confirm" placeholder="Re-enter Password">
            <div class="error" id="confirmError">Passwords do not match</div>

            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="main.html">Sign In</a></p>
    </div>
<script src="script.js"></script>   
</body>
</html>
